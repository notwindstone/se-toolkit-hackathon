services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    env_file:
      - .env.secret
    environment:
      - PORT=3000
      - DATABASE_PATH=/data/chesed.db
    volumes:
      - yesod-data:/data
      - ~/.ssh:/root/.ssh:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      network: host
      args:
        VITE_API_BASE: /
    depends_on:
      - backend
    ports:
      - "4173:4173"
    restart: unless-stopped

volumes:
  yesod-data:
